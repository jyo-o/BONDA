version: "3.9"

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: bonda
      POSTGRES_PASSWORD: bonda
      POSTGRES_DB: bonda
    volumes:
      - tsdb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bonda -d bonda"]
      interval: 5s
      timeout: 5s
      retries: 5

  prober:
    build: .
    depends_on:
      timescaledb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      TIMESCALEDB_URL: postgres://bonda:bonda@timescaledb:5432/bonda?sslmode=disable
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      timescaledb:
        condition: service_healthy

volumes:
  tsdb_data:
  grafana_data:
